<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UNIT Protocol – Utility-Focused Digital Token Infrastructure</title>
  <meta name="description" content="UNIT Protocol (UNIT) is a BEP-20 utility token on BNB Smart Chain with transparent on-chain configuration and verifiable mechanics." />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050814;
      --bg-alt: #070c1f;
      --card: #0b1226;
      --accent: #fbb021;
      --accent-soft: rgba(251, 176, 33, 0.20);
      --accent-2: #58f2c8;
      --text: #f5f7ff;
      --muted: #9aa4c6;
      --danger: #ff4d6a;
      --border: rgba(154, 164, 198, 0.22);
      --radius-lg: 18px;
      --radius-full: 999px;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.45);
      --shadow-chip: 0 12px 30px rgba(0,0,0,0.5);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #17213b 0, #050814 45%, #020312 100%);
      color: var(--text);
      line-height: 1.5;
      padding: 16px;
    }

    .page-shell {
      max-width: 1120px;
      margin: 0 auto 64px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(10,16,36,0.97), rgba(5,7,18,0.97));
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      position: sticky;
      top: 8px;
      z-index: 20;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-pill {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: radial-gradient(circle at 30% 20%, #fff7cf 0, #fdd867 25%, #fbb021 55%, #b47000 100%);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.4),
        0 18px 32px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-pill span {
      font-weight: 800;
      font-size: 22px;
      color: #1c1303;
      text-shadow: 0 1px 0 rgba(255,255,255,0.7);
    }

    .brand-text small {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-text strong {
      font-size: 16px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      padding: 6px 10px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(88,242,200,0.3);
      background: radial-gradient(circle at top left, rgba(88,242,200,0.16), rgba(4,10,28,0.9));
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent-2);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #30e59e;
      box-shadow: 0 0 10px rgba(88,242,200,0.9);
    }

    .primary-btn, .ghost-btn {
      border-radius: var(--radius-full);
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, opacity 0.12s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .primary-btn {
      background: linear-gradient(135deg, #fbb021, #ff7f32);
      color: #1b1206;
      box-shadow: var(--shadow-chip);
    }

    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(0,0,0,0.6); }

    .ghost-btn {
      background: rgba(9,14,34,0.8);
      color: var(--text);
      border: 1px solid rgba(154,164,198,0.35);
    }

    .ghost-btn:hover { background: rgba(16,25,60,0.95); }

    .lang-toggle {
      display: inline-flex;
      padding: 3px;
      border-radius: var(--radius-full);
      background: rgba(10,16,36,0.9);
      border: 1px solid rgba(154,164,198,0.45);
    }

    .lang-btn {
      border-radius: var(--radius-full);
      padding: 6px 11px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      min-width: 40px;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, rgba(251,176,33,0.2), rgba(251,176,33,0.05));
      color: var(--text);
      box-shadow: 0 10px 24px rgba(0,0,0,0.55);
    }

    main {
      margin-top: 28px;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
      gap: 24px;
    }

    .hero {
      padding: 26px 22px 24px;
      border-radius: 22px;
      background: radial-gradient(circle at top left, rgba(251,176,33,0.12) 0, rgba(5,8,22,0.95) 40%, #050814 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    .hero-kicker {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: 30px;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .hero-title span.highlight { color: var(--accent); }

    .hero-sub {
      font-size: 14px;
      color: var(--muted);
      max-width: 640px;
      margin-bottom: 22px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .hero-tag {
      font-size: 11px;
      padding: 5px 10px;
      border-radius: var(--radius-full);
      border: 1px solid rgba(154,164,198,0.6);
      color: var(--muted);
      background: rgba(5,9,25,0.9);
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .hero-footnote {
      font-size: 11px;
      color: var(--muted);
      max-width: 720px;
    }

    .side-panel { display: grid; gap: 14px; }

    .panel-card {
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(7,12,32,0.96), rgba(6,10,28,0.96));
      border: 1px solid var(--border);
      padding: 14px 16px;
    }

    .panel-label {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .panel-main { font-size: 14px; }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: var(--text);
      background: rgba(5,10,30,0.75);
      padding: 2px 6px;
      border-radius: 10px;
      border: 1px solid rgba(154,164,198,0.25);
      display: inline-block;
      word-break: break-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius-full);
      padding: 5px 10px;
      border: 1px solid rgba(251,176,33,0.35);
      background: radial-gradient(circle at top left, rgba(251,176,33,0.18), rgba(7,9,24,0.9));
      font-size: 11px;
      color: var(--accent);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(251,176,33,0.7);
    }

    section {
      margin-top: 32px;
      padding: 22px 20px;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(7,12,32,0.96), rgba(4,8,22,0.98));
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
    }

    section h2 { font-size: 18px; margin-bottom: 6px; }

    section p.lead {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
      max-width: 860px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .feature {
      background: radial-gradient(circle at top left, rgba(88,242,200,0.1), rgba(7,10,30,0.95));
      border-radius: 16px;
      border: 1px solid rgba(88,242,200,0.35);
      padding: 14px 14px 13px;
    }

    .feature h3 { font-size: 14px; margin-bottom: 4px; }

    .feature p { font-size: 12px; color: var(--muted); }

    .tokenomics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .token-card {
      background: radial-gradient(circle at top left, rgba(251,176,33,0.13), rgba(7,10,28,0.96));
      border-radius: 16px;
      border: 1px solid rgba(251,176,33,0.45);
      padding: 12px 14px;
      font-size: 13px;
    }

    .token-card strong { display: block; font-size: 13px; margin-bottom: 2px; }

    .token-card span { font-size: 20px; font-weight: 700; }

    .token-card small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }

    .roadmap { display: grid; gap: 14px; margin-top: 10px; }

    .phase {
      border-radius: 16px;
      border: 1px solid rgba(154,164,198,0.45);
      padding: 12px 14px;
      background: rgba(7,10,28,0.96);
    }

    .phase h3 { font-size: 14px; margin-bottom: 4px; }

    .phase small { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }

    .phase ul { padding-left: 18px; font-size: 12px; color: var(--muted); }

    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px,1fr));
      gap: 14px;
      margin-top: 10px;
    }

    .step {
      border-radius: 16px;
      border: 1px solid rgba(88,242,200,0.4);
      background: radial-gradient(circle at top left, rgba(88,242,200,0.16), rgba(6,10,26,0.96));
      padding: 12px 14px;
      font-size: 13px;
    }

    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(88,242,200,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--accent-2);
      margin-bottom: 4px;
    }

    .step h3 { font-size: 13px; margin-bottom: 4px; }

    .step p { font-size: 12px; color: var(--muted); }

    .legal {
      margin-top: 14px;
      font-size: 11px;
      color: var(--muted);
      border-radius: 14px;
      border: 1px solid rgba(255,77,106,0.6);
      background: radial-gradient(circle at top left, rgba(255,77,106,0.18), rgba(7,8,20,0.96));
      padding: 10px 11px;
    }

    .faq { display: grid; gap: 10px; margin-top: 12px; }

    .faq-item {
      border-radius: 14px;
      border: 1px solid rgba(154,164,198,0.45);
      padding: 10px 12px;
      background: rgba(7,9,24,0.96);
      font-size: 12px;
    }

    .faq-item strong { display: block; margin-bottom: 4px; }

    footer {
      margin-top: 26px;
      padding: 16px 4px 8px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid rgba(46,56,96,0.8);
    }

    footer .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    footer nav { font-size: 11px; gap: 12px; }

    footer a { color: var(--muted); text-decoration: none; }

    footer a:hover { color: var(--accent-2); }

    .lang-section { display: none; }
    .lang-section.active { display: block; }

    .doc-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .doc-links a {
      text-decoration: none;
    }

      header { flex-direction: column; align
